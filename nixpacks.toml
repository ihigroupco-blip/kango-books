[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd backend && npm install", "cd frontend && npm install"]

[phases.build]
cmds = ["cd frontend && npm run build", "cd backend && npx prisma generate"]

[start]
cmd = "cd backend && npx prisma migrate deploy && NODE_ENV=production node src/index.js"
